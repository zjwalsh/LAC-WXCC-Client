version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
        - cp build/static/js/main.*.js build/static/js/widget.bundle.js
        - cp build/static/css/main.*.css build/static/css/widget.styles.css
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
